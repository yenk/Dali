name: Commit Attribution Guard

on:
  pull_request:
  push:

jobs:
  block-bot-attribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail on blocked author or co-author identities
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          zero_sha='0000000000000000000000000000000000000000'
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [[ -n "${PUSH_BEFORE_SHA:-}" && "$PUSH_BEFORE_SHA" != "$zero_sha" ]]; then
            range="${PUSH_BEFORE_SHA}..${CURRENT_SHA}"
          else
            range="${CURRENT_SHA}^!"
          fi

          echo "Inspecting commit range: $range"

          log_payload="$(git log --format=$'%H%nAuthor: %an <%ae>%n%B%n---END---' "$range" || true)"
          if [[ -z "$log_payload" ]]; then
            exit 0
          fi

          blocked_regex='(Author: Cursor Agent <|Author: cursoragent <|Author: Claude <|Author: .*<cursoragent@cursor\.com>|Author: .*<noreply@anthropic\.com>|Co-authored-by: Cursor Agent <|Co-authored-by: cursoragent <|Co-authored-by: Claude <|Co-authored-by: .*<cursoragent@cursor\.com>|Co-authored-by: .*<noreply@anthropic\.com>)'

          if printf '%s\n' "$log_payload" | grep -Ein "$blocked_regex"; then
            echo "::error::Blocked AI bot attribution detected in commit authors or Co-authored-by trailers."
            echo "::error::Rewrite the commit author/co-author metadata before merging."
            exit 1
          fi
